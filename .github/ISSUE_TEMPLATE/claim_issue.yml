name: Claim an Issue
description: Use this template to claim an open issue and report your progress
labels: ["status: claimed"]
body:
  - type: markdown
    attributes:
      value: |
        ## Claiming this issue

        Post this comment on the issue you want to work on. A maintainer will assign it to you.
        You do **not** need maintainer permissions to post a claim — anyone can comment.

        **Rules:**
        - One active claim per contributor at a time.
        - Post a progress update at least every 7 days or the issue may be re-opened for others.
        - If you need to drop the issue, post a comment so it can be re-claimed.

  - type: input
    id: github_handle
    attributes:
      label: Your GitHub handle
      placeholder: "@username"
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: What are you claiming?
      options:
        - Stellar Wave issue
        - Good first issue
        - Regular enhancement / bug
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Planned approach (brief)
      description: One or two sentences on how you plan to tackle this. Helps maintainers spot blockers early.
      placeholder: "I plan to..."
    validations:
      required: true

  - type: input
    id: eta
    attributes:
      label: Estimated completion
      description: Rough date or timeframe (e.g. "within 5 days", "by 2026-06-10")
      placeholder: "within X days"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-claim checklist
      options:
        - label: I have read CONTRIBUTING.md
          required: true
        - label: I have confirmed this issue is not already assigned or claimed
          required: true
        - label: I understand I should post a progress update every 7 days
          required: true
