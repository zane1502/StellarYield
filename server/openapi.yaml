        walletAddress:
          type: string
        period:
          type: object
          properties:
            startTime:
              type: string
              format: date-time
            endTime:
              type: string
              format: date-time
        totalReturn:
          type: number
          format: double
        protocolBreakdown:
          type: array
          items:
            type: object
            properties:
              protocol:
                type: string
              contribution:
                type: number
                format: double
              apy:
                type: number
                format: double
        recommendations:
          type: array
          items:
            type: string

    CompatibilityReport:
      type: object
      properties:
        overallStatus:
          type: string
          enum: [compatible, degraded, incompatible]
        protocols:
          type: array
