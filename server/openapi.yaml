            properties:
              severity:
                type: string
                enum: [critical, warning, info]
              message:
                type: string
              protocol:
                type: string
        lastChecked:
          type: string
          format: date-time

    ProtocolCompatibilityStatus:
      type: object
      properties:
        protocolName:
          type: string
        status:
          type: string
          enum: [compatible, degraded, incompatible, unknown]
        healthScore:
          type: number
          format: double
        lastUpdated:
          type: string
          format: date-time
        issues:
          type: array
          items:
            type: string

    StrategyHealthScore:
      type: object
      properties:
        strategyId:
          type: string
        strategyName:
          type: string
        overallScore:
          type: number
          format: double
        status:
          type: string
          enum: [healthy, degraded, critical, disabled]
        metrics:
          type: object
          properties:
            contractSafety:
              type: number
              format: double
            dataFreshness:
              type: number
              format: double
            providerUptime:
              type: number
              format: double
            liquidityConditions:
              type: number
              format: double
            executionOutcomes:
              type: number
              format: double
        lastUpdated:
          type: string
          format: date-time
        trend:
          type: string
          enum: [improving, stable, declining]
        recommendations:
          type: array
          items:
            type: string

    ProviderReliabilityScore:
      type: object
      properties:
        providerId:
          type: string
        providerName:
          type: string
        overallScore:
          type: number
          format: double
        status:
          type: string
          enum: [reliable, degraded, unreliable]
        metrics:
          type: object
          properties:
            dataFreshness:
              type: number
              format: double
            accuracy:
              type: number
              format: double
            uptime:
              type: number
              format: double
