          type: integer
        amount:
          type: string
        proof:
          type: array
          items:
            type: string

    SwapQuote:
      type: object
      properties:
        fromAsset:
          type: string
        toAsset:
          type: string
        fromAmount:
          type: string
        toAmount:
          type: string
        price:
          type: number
