openapi: 3.0.0
info:
  title: StellarYield API
  description: Backend API for the StellarYield yield farming and portfolio management platform
  version: 1.0.0
  contact:
    name: StellarYield Team

servers:
  - url: http://localhost:3001
    description: Local development server
  - url: https://api.stellaryield.com
    description: Production server

tags:
  - name: Health
    description: System health monitoring
  - name: Yields
    description: Yield data and APY information
  - name: Portfolio
    description: User portfolio and PnL tracking
  - name: Leaderboard
    description: User leaderboard rankings
  - name: Notifications
    description: User notifications
  - name: Referrals
    description: Referral program endpoints
  - name: PnL
    description: Profit and loss calculations
  - name: Export
    description: Data export endpoints
  - name: Zap
    description: Zap feature for token swaps
  - name: Analytics
    description: Analytics and operational metrics
  - name: Treasury
    description: Treasury simulation and scenario management
  - name: Alerts
    description: APY alert management
  - name: AuditMonitoring
    description: Administrative audit monitoring endpoints (admin access required)
  - name: Metrics
    description: Prometheus-compatible metrics scrape endpoint
  - name: Liquidity
    description: Liquidity fragmentation metrics
  - name: Simulator
    description: Simulation endpoints for deposit, rebalance, and failover dry-runs (never executes on-chain)

paths:
  /api/health:
    get:
      summary: Check system health status
      description: Returns the health status of all system components including database, indexer, and Horizon server
      tags:
        - Health
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  database:
                    type: string
                    enum: [up, down]
                    description: Database connection status
                  redis:
                    type: string
                    enum: [up]
                    description: Redis cache status
                  indexer:
                    type: string
                    enum: [up, down, warning]
                    description: Blockchain indexer status
                  horizon:
                    type: string
                    enum: [up, down]
                    description: Stellar Horizon server status
                  timestamp:
                    type: string
                    format: date-time
                    description: Response timestamp
                  latestLedger:
                    type: integer
                    description: Latest ledger number from Horizon
                  syncedLedger:
                    type: integer
                    description: Latest synced ledger by indexer
        '503':
          description: System has critical issues
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /api/yields:
    get:
      summary: Get current yield data
      description: Returns current yield information for all available vaults with APY, TVL, and risk ratings
      tags:
        - Yields
      responses:
        '200':
          description: Successful response with yields data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/YieldData'
        '500':
          description: Failed to fetch yield data

  /api/yields/history:
    get:
      summary: Get historical APY data
      description: Returns historical APY data points for analysis
      tags:
        - Yields
      responses:
        '200':
          description: Successful response with APY history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoricalApyPoint'

  /api/users/{walletAddress}/pnl:
    get:
      summary: Get user's PnL data
      description: Returns profit and loss calculations for a specific user's portfolio
      tags:
        - Portfolio
        - PnL
      parameters:
        - name: walletAddress
          in: path
          required: true
          schema:
            type: string
          description: Stellar wallet address (G...)
      responses:
        '200':
          description: PnL data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PnLData'
        '404':
          description: User not found
        '500':
          description: Failed to fetch PnL data

  /api/users/{walletAddress}/export/csv:
    get:
      summary: Export user data as CSV
      description: Exports user's portfolio transactions and yield history as CSV file
      tags:
        - Export
      parameters:
        - name: walletAddress
          in: path
          required: true
          schema:
            type: string
          description: Stellar wallet address (G...)
      responses:
        '200':
          description: CSV file exported successfully
          content:
            text/csv:
              schema:
                type: string
        '404':
          description: User not found
        '500':
          description: Failed to export data

  /api/leaderboard:
    get:
      summary: Get user leaderboard
      description: Returns ranked list of users by TVL, yield earned, or other metrics
      tags:
        - Leaderboard
      parameters:
        - name: metric
          in: query
          schema:
            type: string
            enum: [tvl, yield, roi]
            default: tvl
          description: Metric to rank by
        - name: timeframe
          in: query
          schema:
            type: string
            enum: [week, month, all]
            default: month
          description: Time period for ranking
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Number of results to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: Leaderboard data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeaderboardEntry'
                  total:
                    type: integer
        '400':
          description: Invalid parameters

  /api/notifications/{walletAddress}:
    get:
      summary: Get user notifications
      description: Retrieves all notifications for a user, ordered by most recent
      tags:
        - Notifications
      parameters:
        - name: walletAddress
          in: path
          required: true
          schema:
            type: string
          description: Stellar wallet address (G...)
      responses:
        '200':
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '500':
          description: Failed to fetch notifications

    delete:
      summary: Clear all notifications
      description: Deletes all notifications for a user
      tags:
        - Notifications
      parameters:
        - name: walletAddress
          in: path
          required: true
          schema:
            type: string
          description: Stellar wallet address (G...)
      responses:
        '204':
          description: Notifications cleared successfully
        '500':
          description: Failed to clear notifications

  /api/notifications/{notificationId}/read:
    patch:
      summary: Mark notification as read
      description: Marks a specific notification as read
      tags:
        - Notifications
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
          description: Notification ID
      responses:
        '204':
          description: Notification marked as read
        '500':
          description: Failed to update notification

  /api/referrals/{walletAddress}:
    get:
      summary: Get referral data
      description: Returns referral statistics and unclaimed rewards for a user
      tags:
        - Referrals
      parameters:
        - name: walletAddress
          in: path
          required: true
          schema:
            type: string
          description: Stellar wallet address (G...)
      responses:
        '200':
          description: Referral data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralData'
        '500':
          description: Failed to fetch referral data

  /api/referrals/claim:
    post:
      summary: Claim referral rewards
      description: Claims accumulated referral rewards for a user
      tags:
        - Referrals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
                  description: Stellar wallet address (G...)
      responses:
        '200':
          description: Rewards claimed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  amount:
                    type: string
                  txHash:
                    type: string
        '400':
          description: Invalid request
        '500':
          description: Failed to claim rewards

  /api/referrals/submit:
    post:
      summary: Apply a referral code
      description: Applies a referral code from another user
      tags:
        - Referrals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                address:
                  type: string
                  description: User's Stellar wallet address
                referralCode:
                  type: string
                  description: Referral code (Stellar address of referrer)
              required:
                - address
                - referralCode
      responses:
        '200':
          description: Referral code applied successfully
        '400':
          description: Invalid referral code or self-referral attempt
        '500':
          description: Failed to apply referral code

  /api/rewards/proof/{walletAddress}:
    get:
      summary: Get reward claim proof
      description: Returns Merkle proof for claiming $YIELD rewards
      tags:
        - Yields
      parameters:
        - name: walletAddress
          in: path
          required: true
          schema:
            type: string
          description: Stellar wallet address (G...)
      responses:
        '200':
          description: Claim proof retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimProof'
        '404':
          description: No rewards available for this address
        '500':
          description: Failed to fetch claim proof

  /api/rewards/claim:
    post:
      summary: Claim YIELD rewards
      description: Executes reward claim transaction with provided proof
      tags:
        - Yields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimRequest'
      responses:
        '200':
          description: Rewards claimed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  txHash:
                    type: string
                  amount:
                    type: string
        '400':
          description: Invalid claim data
        '500':
          description: Failed to claim rewards

  /api/zap/quote:
    post:
      summary: Get token swap quote
      description: Returns a quote for swapping tokens via the Zap feature
      tags:
        - Zap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fromAsset:
                  type: string
                  description: Source asset code or address
                toAsset:
                  type: string
                  description: Destination asset code or address
                amount:
                  type: string
                  description: Amount to swap (in stroops for native assets)
      responses:
        '200':
          description: Quote retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapQuote'
        '400':
          description: Invalid swap parameters
        '500':
          description: Failed to generate quote

  /api/zap/supported-assets:
    get:
      summary: Get supported assets for Zap
      description: Returns list of assets available for token swaps
      tags:
        - Zap
      responses:
        '200':
          description: Supported assets retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                    issuer:
                      type: string
                    name:
                      type: string

  /api/analytics/attribution/{walletAddress}:
    get:
      summary: Generate portfolio attribution report
      description: Returns portfolio attribution analysis for a wallet over a specified time period
      tags:
        - Analytics
      parameters:
        - name: walletAddress
          in: path
          required: true
          schema:
            type: string
          description: Stellar wallet address (G...)
        - name: startTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Start time for attribution period (ISO-8601)
        - name: endTime
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: End time for attribution period (ISO-8601)
      responses:
        '200':
          description: Attribution report generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AttributionReport'
        '400':
          description: Invalid request parameters
        '500':
          description: Failed to generate attribution report

  /api/analytics/attribution/config:
    post:
      summary: Update attribution engine configuration
      description: Updates the configuration for the portfolio attribution engine
      tags:
        - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Configuration object for attribution engine
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  config:
                    type: object
        '500':
          description: Failed to update configuration

  /api/analytics/attribution/cache/{walletAddress}:
    delete:
      summary: Clear attribution cache for wallet
      description: Clears cached attribution data for a specific wallet
      tags:
        - Analytics
      parameters:
        - name: walletAddress
          in: path
          required: true
          schema:
            type: string
          description: Stellar wallet address (G...)
      responses:
        '200':
          description: Cache cleared successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '500':
          description: Failed to clear cache

  /api/analytics/compatibility:
    get:
      summary: Run comprehensive compatibility check
      description: Returns compatibility status for all protocols
      tags:
        - Analytics
      responses:
        '200':
          description: Compatibility check completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/CompatibilityReport'
        '500':
          description: Failed to run compatibility check

  /api/analytics/compatibility/{protocolName}:
    get:
      summary: Check compatibility for specific protocol
      description: Returns compatibility status for a specific protocol
      tags:
        - Analytics
      parameters:
        - name: protocolName
          in: path
          required: true
          schema:
            type: string
          description: Protocol name (e.g., Blend, Soroban)
      responses:
        '200':
          description: Protocol compatibility status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProtocolCompatibilityStatus'
        '500':
          description: Failed to check protocol compatibility

  /api/analytics/compatibility/safe/{protocolName}:
    get:
      summary: Check if protocol is safe for execution
      description: Returns whether a protocol is safe for strategy execution
      tags:
        - Analytics
      parameters:
        - name: protocolName
          in: path
          required: true
          schema:
            type: string
          description: Protocol name (e.g., Blend, Soroban)
      responses:
        '200':
          description: Protocol safety status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      protocolName:
                        type: string
                      isSafe:
                        type: boolean
                      status:
                        type: string
        '500':
          description: Failed to check protocol safety

  /api/analytics/compatibility/config:
    post:
      summary: Update compatibility engine configuration
      description: Updates the configuration for the protocol compatibility engine
      tags:
        - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Configuration object for compatibility engine
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  config:
                    type: object
        '500':
          description: Failed to update configuration

  /api/analytics/health/{strategyId}:
    get:
      summary: Get health score for strategy
      description: Returns health score and metrics for a specific strategy
      tags:
        - Analytics
      parameters:
        - name: strategyId
          in: path
          required: true
          schema:
            type: string
          description: Strategy identifier
        - name: strategyName
          in: query
          schema:
            type: string
          description: Optional strategy name
      responses:
        '200':
          description: Health score retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/StrategyHealthScore'
        '500':
          description: Failed to calculate health score

  /api/analytics/health/batch:
    post:
      summary: Get health scores for multiple strategies
      description: Returns health scores for multiple strategies in a single request
      tags:
        - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                strategyIds:
                  type: array
                  items:
                    type: string
              required:
                - strategyIds
      responses:
        '200':
          description: Health scores retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StrategyHealthScore'
        '400':
          description: Invalid request parameters
        '500':
          description: Failed to get health scores

  /api/analytics/health/alerts:
    get:
      summary: Get critical health alerts
      description: Returns critical health alerts for all strategies
      tags:
        - Analytics
      responses:
        '200':
          description: Health alerts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      alerts:
                        type: array
                        items:
                          type: string
                      criticalCount:
                        type: integer
                      totalStrategies:
                        type: integer
        '500':
          description: Failed to get health alerts

  /api/analytics/health/config:
    post:
      summary: Update health engine configuration
      description: Updates the configuration for the strategy health engine
      tags:
        - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Configuration object for health engine
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  config:
                    type: object
        '500':
          description: Failed to update configuration

  /api/analytics/reliability/{providerId}:
    get:
      summary: Get reliability score for provider
      description: Returns reliability score and metrics for a specific data provider
      tags:
        - Analytics
      parameters:
        - name: providerId
          in: path
          required: true
          schema:
            type: string
          description: Provider identifier
        - name: providerName
          in: query
          schema:
            type: string
          description: Optional provider name
        - name: dataSource
          in: query
          schema:
            type: string
          description: Optional data source type
      responses:
        '200':
          description: Reliability score retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProviderReliabilityScore'
        '500':
          description: Failed to calculate reliability score

  /api/analytics/reliability/batch:
    post:
      summary: Get reliability scores for multiple providers
      description: Returns reliability scores for multiple providers in a single request
      tags:
        - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                providers:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      source:
                        type: string
              required:
                - providers
      responses:
        '200':
          description: Reliability scores retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProviderReliabilityScore'
        '400':
          description: Invalid request parameters
        '500':
          description: Failed to get reliability scores

  /api/analytics/reliability/compare:
    get:
      summary: Compare and rank providers
      description: Returns comparison and ranking of all providers by reliability
      tags:
        - Analytics
      responses:
        '200':
          description: Provider comparison completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        providerId:
                          type: string
                        score:
                          type: number
                        rank:
                          type: integer
        '500':
          description: Failed to compare providers

  /api/analytics/reliability/recommendations:
    get:
      summary: Get providers suitable for recommendations
      description: Returns providers that meet minimum reliability threshold for recommendations
      tags:
        - Analytics
      parameters:
        - name: minReliability
          in: query
          schema:
            type: number
            default: 70
          description: Minimum reliability score (0-100)
      responses:
        '200':
          description: Provider recommendations retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      providers:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProviderReliabilityScore'
                      minReliability:
                        type: number
                      totalProviders:
                        type: integer
                      selectedProviders:
                        type: integer
        '500':
          description: Failed to get provider recommendations

  /api/analytics/reliability/config:
    post:
      summary: Update reliability engine configuration
      description: Updates the configuration for the yield reliability engine
      tags:
        - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Configuration object for reliability engine
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  config:
                    type: object
        '500':
          description: Failed to update configuration

  /api/analytics/dashboard:
    get:
      summary: Get comprehensive analytics dashboard
      description: Returns aggregated analytics data including attribution, compatibility, health, and reliability
      tags:
        - Analytics
      parameters:
        - name: walletAddress
          in: query
          schema:
            type: string
          description: Optional wallet address for attribution data
        - name: strategyIds
          in: query
          schema:
            type: array
            items:
              type: string
          description: Optional array of strategy IDs for health scores
        - name: providerIds
          in: query
          schema:
            type: array
            items:
              type: string
          description: Optional array of provider IDs for reliability scores
      responses:
        '200':
          description: Dashboard data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      attribution:
                        $ref: '#/components/schemas/AttributionReport'
                      compatibility:
                        $ref: '#/components/schemas/CompatibilityReport'
                      healthScores:
                        type: array
                        items:
                          $ref: '#/components/schemas/StrategyHealthScore'
                      reliabilityScores:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProviderReliabilityScore'
                      alerts:
                        type: array
                        items:
                          type: string
                      summary:
                        type: object
                        properties:
                          overallHealth:
                            type: string
                          criticalIssues:
                            type: integer
                          recommendations:
                            type: array
                            items:
                              type: string
                          lastUpdated:
                            type: string
                            format: date-time
        '500':
          description: Failed to fetch dashboard data

  /api/analytics/strategy-state-transitions/{strategyId}:
    get:
      summary: Get strategy state transition audit
      description: Returns audit graph of lifecycle transitions for a strategy
      tags:
        - Analytics
      parameters:
        - name: strategyId
          in: path
          required: true
          schema:
            type: string
          description: Strategy identifier
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
          description: Maximum number of transitions to return
      responses:
        '200':
          description: State transitions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      strategyId:
                        type: string
                      transitions:
                        type: array
                        items:
                          type: object
                          properties:
                            from:
                              type: string
                            to:
                              type: string
                            timestamp:
                              type: string
                              format: date-time
                            reason:
                              type: string
        '500':
          description: Failed to fetch state transitions

  /api/analytics/recommendation-stability/compare:
    post:
      summary: Compare recommendation stability
      description: Compares recommendation outputs from before vs after backend releases
      tags:
        - Analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                before:
                  type: array
                  items:
                    type: object
                  description: Recommendation outputs from before release
                after:
                  type: array
